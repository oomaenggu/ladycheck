    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: #f6f7fb;
      color: #1f2937;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: #eef2ff;
      color: #4338ca;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 32px;
      line-height: 1.2;
    }

    .sub {
      margin: 0;
      color: #6b7280;
      line-height: 1.7;
      max-width: 760px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin: 24px 0 20px;
    }

    .info-card,
    .compare-box,
    .group-box {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.04);
    }

    .info-label {
      margin: 0 0 8px;
      font-size: 13px;
      color: #6b7280;
      font-weight: 700;
    }

    .info-value {
      margin: 0;
      font-size: 22px;
      font-weight: 800;
      word-break: break-word;
    }

    .toolbar {
      margin: 10px 0 18px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .search {
      flex: 1;
      min-width: 240px;
      padding: 14px 16px;
      border: 1px solid #d1d5db;
      border-radius: 16px;
      background: white;
      font-size: 15px;
      outline: none;
    }

    .search:focus,
    .compare-textarea:focus {
      border-color: #818cf8;
      box-shadow: 0 0 0 4px rgba(129, 140, 248, 0.15);
    }

    .count {
      display: flex;
      align-items: center;
      padding: 0 14px;
      border-radius: 16px;
      background: white;
      border: 1px solid #e5e7eb;
      color: #4b5563;
      font-size: 14px;
      font-weight: 600;
    }

    .section-title {
      margin: 28px 0 14px;
      font-size: 18px;
      font-weight: 800;
    }

    .fold-box {
      margin-top: 28px;
    }

    .fold-box summary {
      list-style: none;
      cursor: pointer;
      user-select: none;
    }

    .fold-box summary::-webkit-details-marker {
      display: none;
    }

    .fold-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .fold-summary .section-title {
      margin: 0;
    }

    .fold-arrow {
      font-size: 14px;
      color: #6b7280;
      transition: transform 0.2s ease;
      flex-shrink: 0;
    }

    .fold-box[open] .fold-arrow {
      transform: rotate(180deg);
    }

    .fold-content {
      margin-top: 14px;
    }

    .recent-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 8px;
    }

    .recent-item {
      display: inline-flex;
      align-items: center;
      padding: 10px 14px;
      border-radius: 999px;
      background: white;
      border: 1px solid #e5e7eb;
      color: #374151;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.04);
    }

    .recent-item:hover {
      transform: translateY(-1px);
    }

    .updated-list {
      display: grid;
      gap: 10px;
      margin-bottom: 8px;
    }

    .updated-item {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 14px 16px;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.04);
    }

    .updated-main {
      font-size: 14px;
      font-weight: 800;
      color: #1f2937;
      margin: 0 0 6px;
      word-break: break-all;
    }

    .updated-note {
      margin: 0;
      font-size: 13px;
      color: #6b7280;
      line-height: 1.5;
      word-break: break-word;
    }

    .compare-box {
      margin-top: 10px;
    }

    .compare-desc {
      margin: 0 0 12px;
      color: #6b7280;
      line-height: 1.6;
      font-size: 14px;
    }

    .compare-textarea {
      width: 100%;
      min-height: 140px;
      resize: vertical;
      padding: 14px 16px;
      border: 1px solid #d1d5db;
      border-radius: 16px;
      background: #fff;
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }

    .compare-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .btn,
    .btn-secondary {
      border: none;
      text-decoration: none;
      padding: 11px 14px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease;
    }

    .btn {
      background: #111827;
      color: white;
    }

    .btn-secondary {
      background: #eef2ff;
      color: #4338ca;
    }

    .btn:hover,
    .btn-secondary:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(0,0,0,.08);
    }

    .compare-result {
      margin-top: 14px;
    }

    .compare-result-count {
      margin: 0 0 12px;
      font-size: 15px;
      font-weight: 800;
    }

    .compare-result-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .group-list {
      display: grid;
      gap: 16px;
    }

    .group-title {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 800;
      color: #4338ca;
    }

    .group-items {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .group-chip {
      display: inline-flex;
      align-items: center;
      padding: 9px 13px;
      border-radius: 999px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      color: #374151;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
    }

    .list {
      display: grid;
      gap: 14px;
      grid-template-columns: 1fr;
      margin-top: 14px;
    }

    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
    }

    .left {
      flex: 1;
      min-width: 0;
    }

    .handle {
      margin: 0;
      font-size: 22px;
      font-weight: 800;
      word-break: break-all;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .empty {
      text-align: center;
      padding: 24px 20px;
      border: 1px dashed #cbd5e1;
      border-radius: 22px;
      background: rgba(255,255,255,.8);
      color: #6b7280;
    }

    .footer {
      margin-top: 18px;
      color: #9ca3af;
      font-size: 13px;
      line-height: 1.6;
    }

    @media (min-width: 900px) {
      .list {
        grid-template-columns: 1fr 1fr;
      }

      h1 {
        font-size: 38px;
      }

      .handle {
        font-size: 24px;
      }

      .search {
        max-width: 420px;
      }
    }

    @media (max-width: 720px) {
      .wrap {
        padding: 28px 16px 60px;
      }

      .info-grid {
        grid-template-columns: 1fr;
      }

      .card {
        flex-direction: column;
        align-items: flex-start;
      }

      .actions {

      .btn,
      .btn-secondary {
        flex: 1;
        text-align: center;
      }

      h1 {
        font-size: 26px;
      }

      .handle {
        font-size: 20px;
      }

      .info-value {
        font-size: 20px;
      }
    }
  </style>

  <div class="wrap">
    <section class="hero">
      <div class="badge">ladycheck</div>
      <h1>레이디지키미 계정 리스트</h1>
      <p class="sub">

      </p>
    </section>

    <section class="info-grid">
      <article class="info-card">

      <article class="info-card">

      <article class="info-card">
        <p class="info-label">최근 추가</p>
        <p class="info-value" id="recentCount">0명</p>
      </article>
    </section>

    <section>
      <div class="toolbar">
        <input id="searchInput" class="search" type="text" placeholder="아이디 검색" />
        <div class="count" id="countBox">0개</div>
      </div>
    </section>

    <details class="fold-box" open>
      <summary class="fold-summary">
        <h2 class="section-title">🆕 최근 추가된 계정</h2>
        <span class="fold-arrow">▼</span>
      </summary>
      <div class="fold-content">
        <div class="recent-list" id="recentList"></div>
      </div>
    </details>

    <details class="fold-box">
      <summary class="fold-summary">
        <h2 class="section-title">🔄 최근 변경된 계정</h2>
        <span class="fold-arrow">▼</span>
      </summary>
      <div class="fold-content">
        <div class="updated-list" id="updatedList"></div>
      </div>
    </details>

    <details class="fold-box">
      <summary class="fold-summary">
        <h2 class="section-title">🔍 내 팔로잉 대조하기</h2>
        <span class="fold-arrow">▼</span>
      </summary>
      <div class="fold-content">
        <div class="compare-box">
          <p class="compare-desc">
            팔로잉 목록의 아이디들을 복사해서 붙여넣어 보세요.<br>
            줄바꿈, 쉼표, 공백으로 구분해도 자동으로 비교됩니다.
          </p>
          <textarea
            id="compareInput"
            class="compare-textarea"
            placeholder="@아이디1&#10;@아이디2&#10;아이디3"
          ></textarea>
          <div class="compare-actions">
            <button class="btn" id="compareBtn" type="button">대조하기</button>
            <button class="btn-secondary" id="clearCompareBtn" type="button">지우기</button>
          </div>
          <div class="compare-result" id="compareResult"></div>
        </div>
      </div>
    </details>

    <details class="fold-box">
      <summary class="fold-summary">
        <h2 class="section-title">🔠 알파벳별 정리</h2>
        <span class="fold-arrow">▼</span>
      </summary>
      <div class="fold-content">
        <div class="group-box">
          <div class="group-list" id="alphabetGroupList"></div>
        </div>
      </div>
    </details>

    <section>
      <h2 class="section-title">📌 전체 계정 리스트</h2>
      <div class="list" id="list"></div>
    </section>

    <p class="footer"></p>
  </div>

    accountUrl: "https://x.com/lmc8710"
  },{
    id: "@SoWhatxx7777",
    accountUrl: "https://x.com/SoWhatxx7777"
  },{
    id: "@chrlflsdkwo",
    accountUrl: "https://x.com/chrlflsdkwo"
  },{
    id: "@mjy8211",
    accountUrl: "https://x.com/mjy8211"
  },{
    id: "@HelelelIng",
    accountUrl: "https://x.com/HelelelIng"
  },{
    id: "@Shinjinmoon",
    accountUrl: "https://x.com/Shinjinmoon"
  },{
    id: "@geekstagram_",
    accountUrl: "https://x.com/geekstagram_"
  }
    ];

    const accounts = [...accounts1, ...accounts2];

    const list = document.getElementById('list');
    const searchInput = document.getElementById('searchInput');
    const countBox = document.getElementById('countBox');
    const totalCount = document.getElementById('totalCount');
    const updatedDate = document.getElementById('updatedDate');
    const recentCount = document.getElementById('recentCount');
    const recentList = document.getElementById('recentList');
    const updatedList = document.getElementById('updatedList');

    const compareInput = document.getElementById('compareInput');
    const compareBtn = document.getElementById('compareBtn');
    const clearCompareBtn = document.getElementById('clearCompareBtn');
    const compareResult = document.getElementById('compareResult');
    const alphabetGroupList = document.getElementById('alphabetGroupList');

    function normalizeId(value) {
      return String(value).trim().replace(/^@+/, '').toLowerCase();
    }

    function getUniqueAccounts(items) {
      const uniqueMap = new Map();

      items.forEach(item => {
        const key = normalizeId(item.id);
        if (!uniqueMap.has(key)) {
          uniqueMap.set(key, item);
        }
      });

      return Array.from(uniqueMap.values());
    }

    function getSortedAccounts(items) {
      return [...items].sort((a, b) => {
        const aId = normalizeId(a.id);
        const bId = normalizeId(b.id);
        return aId.localeCompare(bId, 'en', { sensitivity: 'base' });
      });
    }

    function getGroupKey(id) {
      const normalized = normalizeId(id);
      const firstChar = normalized.charAt(0).toUpperCase();
      return /^[A-Z]$/.test(firstChar) ? firstChar : '#';
    }

    function renderRecent() {
      const uniqueRecent = getUniqueAccounts(accounts2).slice(-20).reverse();

      recentCount.textContent = `${recentAddedCount}명`;
      updatedDate.textContent = lastUpdated;

      if (!uniqueRecent.length) {
        recentList.innerHTML = `<div class="empty">최근 추가된 계정이 아직 없어요</div>`;
        return;
      }

      recentList.innerHTML = uniqueRecent.map(item => `
        <a class="recent-item" href="${item.accountUrl}" target="_blank" rel="noopener noreferrer">${item.id}</a>
      `).join('');
    }

    function renderUpdated() {
      if (!updatedAccounts.length) {
        updatedList.innerHTML = `<div class="empty">최근 변경된 계정이 아직 없어요</div>`;
        return;
      }

      updatedList.innerHTML = updatedAccounts.map(item => `
        <article class="updated-item">
          <p class="updated-main">${item.before} → ${item.after}</p>
          <p class="updated-note">${item.note}</p>
        </article>
      `).join('');
    }

    function renderAlphabetGroups(items) {
      const uniqueSorted = getSortedAccounts(getUniqueAccounts(items));
      const groups = {};

      uniqueSorted.forEach(item => {
        const key = getGroupKey(item.id);
        if (!groups[key]) groups[key] = [];
        groups[key].push(item);
      });

      const orderedKeys = [
        ...Object.keys(groups).filter(key => key !== '#').sort(),
        ...(groups['#'] ? ['#'] : [])
      ];

      if (!orderedKeys.length) {
        alphabetGroupList.innerHTML = `<div class="empty">표시할 계정이 없어요</div>`;
        return;
      }

      alphabetGroupList.innerHTML = orderedKeys.map(key => `
        <section>
          <h3 class="group-title">${key}</h3>
          <div class="group-items">
            ${groups[key].map(item => `
              <a class="group-chip" href="${item.accountUrl}" target="_blank" rel="noopener noreferrer">${item.id}</a>
            `).join('')}
          </div>
        </section>
      `).join('');
    }

    function render(items) {
      items = getUniqueAccounts(items);

      countBox.textContent = `${items.length}개`;
      totalCount.textContent = `${items.length}명`;

      if (!items.length) {
        list.innerHTML = `<div class="empty">검색 결과가 없어요</div>`;
        renderAlphabetGroups([]);
        return;
      }

      const sortedItems = getSortedAccounts(items);

      list.innerHTML = sortedItems.map(item => `
        <article class="card">
          <div class="left">
            <h2 class="handle">${item.id}</h2>
          </div>
          <div class="actions">
            <a class="btn" href="${item.accountUrl}" target="_blank" rel="noopener noreferrer">
              계정 보기
            </a>
          </div>
        </article>
      `).join('');

      renderAlphabetGroups(sortedItems);
    }

    function renderCompareResult(matches, totalInputCount) {
      if (!totalInputCount) {
        compareResult.innerHTML = '';
        return;
      }

      if (!matches.length) {
        compareResult.innerHTML = `
          <p class="compare-result-count">일치하는 계정이 없어요</p>
        `;
        return;
      }

      compareResult.innerHTML = `
        <p class="compare-result-count">일치하는 계정 ${matches.length}명</p>
        <div class="compare-result-list">
          ${matches.map(item => `
            <a class="recent-item" href="${item.accountUrl}" target="_blank" rel="noopener noreferrer">${item.id}</a>
          `).join('')}
        </div>
      `;
    }

    function compareAccounts() {
      const raw = compareInput.value.trim();

      if (!raw) {
        compareResult.innerHTML = `
          <p class="compare-result-count">비교할 아이디를 붙여넣어 주세요</p>
        `;
        return;
      }

      const tokens = raw
        .split(/[\s,]+/)
        .map(token => normalizeId(token))
        .filter(Boolean);

      const uniqueTokens = [...new Set(tokens)];
      const accountMap = new Map(
        getUniqueAccounts(accounts).map(item => [normalizeId(item.id), item])
      );

      const matches = uniqueTokens
        .filter(token => accountMap.has(token))
        .map(token => accountMap.get(token));

      renderCompareResult(matches, uniqueTokens.length);
    }

    searchInput.addEventListener('input', (e) => {
      const keyword = normalizeId(e.target.value);

      const filtered = !keyword
        ? accounts
        : accounts.filter(item => normalizeId(item.id).includes(keyword));

      render(filtered);
    });

    compareBtn.addEventListener('click', compareAccounts);

    clearCompareBtn.addEventListener('click', () => {
      compareInput.value = '';
      compareResult.innerHTML = '';
    });

    renderRecent();
    renderUpdated();
    render(accounts);
  </script>
</body>
</html>
