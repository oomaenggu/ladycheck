<meta charset="UTF-8">

<style>
*{box-sizing:border-box;}
:root{
--bg:#faf7ff;
--card:#fff;
--main:#7c3aed;
--main-soft:#ede9fe;
--text:#1f1f29;
--muted:#777487;
--line:#e8e2f5;
--danger:#ef4444;
--change:#d97706;
--shadow:0 8px 24px rgba(124,58,237,.08);
}
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
background:var(--bg);
color:var(--text);
line-height:1.5;
}
.wrap{
width:min(760px,100%);
margin:0 auto;
padding:24px 16px 60px;
}
header{text-align:center;padding:12px 0 24px;}
.title{margin:0;font-size:34px;font-weight:800;color:var(--main);}
.subtitle{margin:8px 0 0;font-size:14px;color:var(--muted);}
.update-date{
display:inline-block;
margin-top:14px;
padding:6px 12px;
border-radius:999px;
background:var(--main-soft);
color:var(--main);
font-size:13px;
font-weight:700;
}
.search-box{
position:sticky;
top:0;
z-index:10;
padding:10px 0 16px;
background:linear-gradient(to bottom,var(--bg) 80%,transparent);
}
.search-wrap{
position:relative;
display:flex;
align-items:center;
}
.search-icon{
position:absolute;
left:16px;
width:18px;
height:18px;
color:var(--muted);
pointer-events:none;
flex-shrink:0;
}
.search-input{
width:100%;
padding:15px 16px 15px 44px;
border:1px solid var(--line);
border-radius:18px;
font-size:16px;
outline:none;
transition:border-color .2s;
background:var(--card);
}
.search-input:focus{
border-color:var(--main);
}
.search-help{margin:8px 4px 0;font-size:12px;color:var(--muted);}
.section{
margin-top:16px;
background:var(--card);
border:1px solid var(--line);
border-radius:22px;
overflow:hidden;
box-shadow:var(--shadow);
}
.section summary{
cursor:pointer;
list-style:none;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:800;
}
.section summary::-webkit-details-marker{display:none;}
.arrow{
width:20px;
height:20px;
flex-shrink:0;
color:var(--muted);
transition:transform .25s ease;
display:flex;
align-items:center;
justify-content:center;
}
.arrow svg{
width:16px;
height:16px;
stroke:currentColor;
stroke-width:2.5;
stroke-linecap:round;
stroke-linejoin:round;
fill:none;
}
details[open] .arrow{transform:rotate(180deg);}
.section-body{
padding:14px;
border-top:1px solid var(--line);
}
.badge{
display:inline-block;
padding:2px 8px;
border-radius:999px;
background:var(--main);
color:#fff;
font-size:12px;
font-weight:700;
margin-left:6px;
}
.account-list{
display:grid;
gap:8px;
padding:0;
margin:0;
list-style:none;
}
.account-item{
display:flex;
justify-content:space-between;
gap:10px;
padding:12px;
border:1px solid var(--line);
border-radius:14px;
background:#fff;
}
.account-id{
font-weight:800;
word-break:break-all;
text-decoration:none;
color:inherit;
}
.account-meta{
font-size:12px;
color:var(--muted);
white-space:nowrap;
}
.status-added{color:var(--main);font-weight:800;}
.status-old{color:#64748b;font-weight:800;}
.alphabet-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(58px,1fr));
gap:8px;
margin-bottom:14px;
}
.alphabet-btn{
border:1px solid var(--line);
background:var(--main-soft);
color:var(--main);
padding:10px 6px;
border-radius:14px;
font-weight:800;
cursor:pointer;
transition:background .15s, color .15s;
}
.alphabet-btn:hover{
background:var(--main);
color:#fff;
}
.alphabet-group{
margin-top:14px;
padding-top:10px;
border-top:1px dashed var(--line);
}
.alphabet-heading{
margin:0 0 8px;
color:var(--main);
}
textarea{
width:100%;
min-height:150px;
padding:14px;
border:1px solid var(--line);
border-radius:16px;
resize:vertical;
font-family:inherit;
font-size:14px;
outline:none;
}
.btn-row{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-top:10px;
}
.action-btn,.sub-btn{
border:0;
padding:11px 14px;
border-radius:14px;
font-weight:800;
cursor:pointer;
}
.action-btn{background:var(--main);color:#fff;}
.sub-btn{background:var(--main-soft);color:var(--main);}
.result-box{
display:none;
margin-top:12px;
padding:12px;
border-radius:14px;
background:#fbfaff;
border:1px solid var(--line);
}
.notice{
margin-top:16px;
padding:16px;
border-radius:20px;
background:#fff;
border:1px solid var(--line);
font-size:13px;
color:var(--muted);
}
.change-item{
padding:12px;
border:1px solid var(--line);
border-radius:14px;
background:#fff;
margin-bottom:8px;
}
.change-top{
font-weight:800;
word-break:break-all;
}
.change-arrow{
color:var(--change);
padding:0 6px;
}
.change-note{
margin-top:4px;
font-size:12px;
color:var(--muted);
}
.empty{
padding:16px;
text-align:center;
color:var(--muted);
}
mark{
background:#fef3c7;
padding:0 2px;
border-radius:4px;
}
@media(max-width:480px){
.account-item{flex-direction:column;align-items:flex-start;}
}
</style>
</head>

<main class="wrap">

<header>
<h1 class="title">ladycheck</h1>
<p class="subtitle">레이디지키미 / 지킴이 기반 계정 확인 리스트</p>
<div class="update-date">마지막 업데이트: 2026.04.27</div>
</header>

<div class="search-box">
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="searchInput" class="search-input" type="search" placeholder="아이디 검색">
  </div>
  <p class="search-help">아이디만 검색 가능합니다.</p>
</div>

<details class="section" open>
<summary>
<span>최근 추가된 계정 <span id="recentAddedCount" class="badge">0</span></span>
<span class="arrow">
  <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
</span>
</summary>
<div class="section-body">
<ul id="recentAddedList" class="account-list"></ul>
</div>
</details>

<details class="section">
<summary>
<span>최근 변경 / 삭제 계정 <span id="recentChangedCount" class="badge">0</span></span>
<span class="arrow">
  <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
</span>
</summary>
<div class="section-body" id="recentChangedList"></div>
</details>

<details class="section">
<summary>
<span>내 팔로잉 대조하기</span>
<span class="arrow">
  <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
</span>
</summary>
<div class="section-body">
<textarea id="followingInput" placeholder="내 팔로잉 아이디 목록 붙여넣기"></textarea>
<div class="btn-row">
<button class="action-btn" onclick="compareFollowing()">대조하기</button>
<button class="sub-btn" onclick="clearCompare()">초기화</button>
</div>
<div id="compareResult" class="result-box"></div>
</div>
</details>

<details class="section" open>
<summary>
<span>알파벳별 정리 <span id="alphabetCount" class="badge">0</span></span>
<span class="arrow">
  <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
</span>
</summary>
<div class="section-body">
<div id="alphabetNav" class="alphabet-grid"></div>
<div id="alphabetGroups"></div>
</div>
</details>

<details class="section">
<summary>
<span>전체 계정 리스트 <span id="totalCount" class="badge">0</span></span>
<span class="arrow">
  <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
</span>
</summary>
<div class="section-body">
<ul id="allAccountList" class="account-list"></ul>
</div>
</details>

<section class="notice">
<strong>안내</strong><br>
레이디체크는 공개적으로 확인 가능한 계정 정보를 기반으로 정리됩니다.<br>
오류 제보 / 추가 제보 / 삭제 요청은 멘션, DM, 스핀으로 보내주세요.<br>
등록 기준에 맞지 않는 제보는 반영되지 않을 수 있습니다.
</section>

</main>

const today="2026.04.27";
const RECENT_LIMIT=30;

function normalizeId(value){
return String(value||"")
.trim()
.replace(/^@/,"")
.replace(/^https?:\/\/(x|twitter)\.com\//i,"")
.split(/[/?#\s]/)[0]
.toLowerCase();
}

const accounts=[
...accounts1.map(v=>{
const id=normalizeId(v.id);
return{id,accountUrl:v.accountUrl||`https://x.com/${id}`,status:"old",note:"기존 등록",addedAt:"",updatedAt:""};
}),
...accounts2.map(v=>{
const id=normalizeId(v.id);
return{id,accountUrl:v.accountUrl||`https://x.com/${id}`,status:"added",note:"신규 등록",addedAt:today,updatedAt:today};
})
].filter((item,index,self)=>index===self.findIndex(v=>v.id===item.id));

function highlight(text,keyword){
if(!keyword) return text;
const safe=keyword.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
return text.replace(new RegExp(safe,"ig"),m=>`<mark>${m}</mark>`);
}

function accountItem(account,keyword=""){
return `<li class="account-item">
<a class="account-id" href="${account.accountUrl}" target="_blank">@${highlight(account.id,keyword)}</a>
<span class="account-meta">${account.note}</span>
</li>`;
}

function renderList(id,list,keyword=""){
const el=document.getElementById(id);
el.innerHTML=!list.length
?`<li class="empty">표시할 계정이 없습니다.</li>`
:list.map(v=>accountItem(v,keyword)).join("");
}

function renderUpdated(){
const el=document.getElementById("recentChangedList");
document.getElementById("recentChangedCount").textContent=updatedAccounts.length;
el.innerHTML=!updatedAccounts.length
?`<div class="empty">표시할 계정이 없습니다.</div>`
:updatedAccounts.map(v=>`<div class="change-item"><div class="change-top">${v.before}<span class="change-arrow">→</span>${v.after}</div><div class="change-note">${v.note}</div></div>`).join("");
}

function renderAlphabet(list,keyword=""){
const sorted=[...list].sort((a,b)=>a.id.localeCompare(b.id));
const groups={};
sorted.forEach(v=>{
const first=v.id.charAt(0).toUpperCase();
const key=/^[A-Z]$/.test(first)?first:"#";
if(!groups[key]) groups[key]=[];
groups[key].push(v);
});
const keys=Object.keys(groups).sort();
document.getElementById("alphabetCount").textContent=sorted.length;
document.getElementById("alphabetNav").innerHTML=keys.map(key=>`<button class="alphabet-btn" onclick="document.getElementById('group-${key}').scrollIntoView({behavior:'smooth'})">${key} ${groups[key].length}</button>`).join("");
document.getElementById("alphabetGroups").innerHTML=keys.map(key=>`<section id="group-${key}" class="alphabet-group"><h3 class="alphabet-heading">${key}</h3><ul class="account-list">${groups[key].map(v=>accountItem(v,keyword)).join("")}</ul></section>`).join("");
}

function render(){
const keyword=normalizeId(document.getElementById("searchInput").value);
const filtered=!keyword?accounts:accounts.filter(v=>v.id.includes(keyword));
const recent=filtered.filter(v=>v.status==="added").slice(0,RECENT_LIMIT);
document.getElementById("recentAddedCount").textContent=recent.length;
document.getElementById("totalCount").textContent=filtered.length;
renderList("recentAddedList",recent,keyword);
renderList("allAccountList",filtered,keyword);
renderAlphabet(filtered,keyword);
renderUpdated();
}

function compareFollowing(){
const input=document.getElementById("followingInput").value;
const ids=[...new Set(input.split(/[\n,\s]+/).map(normalizeId).filter(Boolean))];
const registered=new Set(accounts.map(v=>v.id));
const matched=ids.filter(v=>registered.has(v));
const box=document.getElementById("compareResult");
box.style.display="block";
if(!ids.length){box.innerHTML="아이디를 입력해 주세요.";return;}
if(!matched.length){box.innerHTML="일치하는 계정이 없습니다.";return;}
box.innerHTML=`<strong>일치하는 계정 ${matched.length}개</strong><ul class="account-list" style="margin-top:10px;">${matched.map(id=>accountItem(accounts.find(v=>v.id===id))).join("")}</ul>`;
}

function clearCompare(){
document.getElementById("followingInput").value="";
const box=document.getElementById("compareResult");
box.style.display="none";
box.innerHTML="";
}

document.getElementById("searchInput").addEventListener("input",render);
render();
